<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>microDOS(2) | Store Locator</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#0a0a0a',
                            800: '#171717',
                            700: '#262626',
                            accent: '#3b82f6', // Adjust to match exact microDOS accent color
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for the location list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #171717;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
        
        /* Overriding Leaflet popups for dark mode */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background-color: #171717;
            color: #f4f4f5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .leaflet-popup-content-wrapper {
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
        }
        .leaflet-popup-content h3 {
            margin: 0 0 4px 0;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .leaflet-popup-content p {
            margin: 2px 0;
            font-size: 0.9rem;
            color: #a1a1aa;
        }
        .leaflet-container a.leaflet-popup-close-button {
            color: #a1a1aa;
        }
    </style>
</head>
<body class="bg-brand-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navigation (Mirrored from main site structure) -->
    <nav class="border-b border-brand-800 bg-brand-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0">
                    <a href="https://microdos2.github.io/SINGLE-LOCATION/" class="text-2xl font-bold tracking-tighter"><span class="text-[#44f80c]">micro</span><span class="text-[#9a02d0]">DOS</span><span class="text-[#ff66c4]">(2)</span></a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="https://microdos2.github.io/SINGLE-LOCATION/ARTICLESANDSTUDIES.html" class="text-gray-300 hover:text-white transition-colors">Benefits</a>
                    <a href="https://microdos2.github.io/SINGLE-LOCATION/#faq" class="text-gray-300 hover:text-white transition-colors">FAQ</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-4xl font-bold tracking-tight mb-2">Find a Retailer</h1>
            <p class="text-gray-400 text-lg">Locate authorized dispensaries and wellness centers carrying <span class="font-semibold text-[#44f80c]">micro</span><span class="font-semibold text-[#9a02d0]">DOS</span><span class="font-semibold text-[#ff66c4]">(2)</span> products.</p>
        </div>

        <!-- App Container: List + Map -->
        <div class="flex flex-col md:flex-row gap-6 h-[600px] border border-brand-800 rounded-xl overflow-hidden bg-brand-800/50">
            
            <!-- Store List Sidebar -->
            <div class="w-full md:w-1/3 h-full flex flex-col bg-brand-900 border-r border-brand-800">
                <div class="p-4 border-b border-brand-800">
                    <input type="text" id="searchInput" placeholder="Search by city or zip..." class="w-full bg-brand-800 text-white border border-brand-700 rounded-lg px-4 py-2 focus:outline-none focus:border-brand-accent transition-colors">
                </div>
                
                <div id="storeList" class="overflow-y-auto flex-grow custom-scrollbar p-2">
                    <!-- Store items injected via JavaScript -->
                </div>
            </div>

            <!-- Map Area -->
            <div class="w-full md:w-2/3 h-[400px] md:h-full relative z-0">
                <div id="map" class="w-full h-full"></div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-brand-800 bg-brand-900 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
            <p>© 2026 <span class="font-semibold text-[#44f80c]">micro</span><span class="font-semibold text-[#9a02d0]">DOS</span><span class="font-semibold text-[#ff66c4]">(2)</span> Inc. All rights reserved.</p>
            <p class="mt-2 text-xs">This product is intended for adults. Use responsibly.</p>
        </div>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. Data Structure: Array of Store Objects
        // Replace these with your actual retail locations.
        const stores = [
            {
                id: 1,
                name: "Apex Wellness Arvada",
                address: "7403 Grandview Ave, Arvada, CO 80002",
                city: "Arvada",
                lat: 39.7997,
                lng: -105.0815,
                phone: "(303) 555-0101",
                stock: "In Stock"
            },
            {
                id: 2,
                name: "Elevated Clarity Denver",
                address: "2000 W 32nd Ave, Denver, CO 80211",
                city: "Denver",
                lat: 39.7621,
                lng: -105.0105,
                phone: "(720) 555-0102",
                stock: "Low Stock"
            },
            {
                id: 3,
                name: "Highlands Precision",
                address: "3450 W 32nd Ave, Denver, CO 80211",
                city: "Denver",
                lat: 39.7620,
                lng: -105.0315,
                phone: "(720) 555-0103",
                stock: "Out of Stock"
            },
            {
                id: 4,
                name: "Boulder Psychedelic Supply",
                address: "1500 Pearl St, Boulder, CO 80302",
                city: "Boulder",
                lat: 40.0185,
                lng: -105.2740,
                phone: "(303) 555-0104",
                stock: "In Stock"
            }
        ];

        // 2. Initialize Map
        // Starting coordinates centered generally around the dataset (Denver area)
        const map = L.map('map').setView([39.85, -105.15], 10);

        // Load CartoDB Dark Matter tiles (No API key needed, matches dark theme)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Custom marker icon creation (optional, using default Leaflet for stability here, styled via CSS context)
        const markers = [];
        const storeListContainer = document.getElementById('storeList');
        const searchInput = document.getElementById('searchInput');

        // 3. Render Stores function
        function renderStores(filteredStores) {
            // Clear existing list and markers
            storeListContainer.innerHTML = '';
            markers.forEach(markerObj => map.removeLayer(markerObj.marker));
            markers.length = 0;

            if (filteredStores.length === 0) {
                storeListContainer.innerHTML = '<p class="text-gray-500 text-center mt-4">No locations found.</p>';
                return;
            }

            const bounds = L.latLngBounds();

            filteredStores.forEach(store => {
                // Determine stock badge color
                let stockClass = "bg-green-500/10 text-green-400 border-green-500/20";
                if (store.stock === "Low Stock") stockClass = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";
                if (store.stock === "Out of Stock") stockClass = "bg-red-500/10 text-red-400 border-red-500/20";

                // Create Sidebar Item
                const listItem = document.createElement('div');
                listItem.className = "p-4 border-b border-brand-800 hover:bg-brand-800 cursor-pointer transition-colors group";
                listItem.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-semibold text-white group-hover:text-brand-accent transition-colors">${store.name}</h3>
                        <span class="text-[10px] px-2 py-0.5 rounded border uppercase tracking-wider ${stockClass}">${store.stock}</span>
                    </div>
                    <p class="text-sm text-gray-400 mb-1">${store.address}</p>
                    <p class="text-sm text-gray-500">${store.phone}</p>
                `;

                // Create Map Marker
                const marker = L.marker([store.lat, store.lng]).addTo(map);
                
                // Popup Content
                const popupContent = `
                    <div>
                        <h3>${store.name}</h3>
                        <p>${store.address}</p>
                        <p>${store.phone}</p>
                    </div>
                `;
                marker.bindPopup(popupContent);

                // Add to bounds calculation
                bounds.extend([store.lat, store.lng]);

                // Store reference for interactions
                markers.push({ id: store.id, marker: marker, element: listItem });

                // Interaction: Click list item to zoom map to marker
                listItem.addEventListener('click', () => {
                    map.flyTo([store.lat, store.lng], 15, { duration: 1.5 });
                    marker.openPopup();
                    
                    // Highlight active item
                    document.querySelectorAll('#storeList > div').forEach(el => el.classList.remove('bg-brand-800'));
                    listItem.classList.add('bg-brand-800');
                });

                storeListContainer.appendChild(listItem);
            });

            // Adjust map view to fit all markers if there is more than one
            if (filteredStores.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        // 4. Implement Search/Filter functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = stores.filter(store => 
                store.name.toLowerCase().includes(searchTerm) || 
                store.address.toLowerCase().includes(searchTerm) ||
                store.city.toLowerCase().includes(searchTerm)
            );
            renderStores(filtered);
        });

        // Initial Render
        renderStores(stores);

    </script>
</body>
</html>
